components_manager:
  task_processors:
    main-task-processor:
      worker_threads: 4

    fs-task-processor:
      worker_threads: 2
  
  coro_pool:
    stack_size: $stack_size

  components:
    server:
      listener:
        port: $server-port
        task_processor: main-task-processor

    logging:
      fs-task-processor: fs-task-processor
      loggers:
        default:
          file_path: '@stderr'
          level: $logger-level
          overflow_behavior: discard

    dynamic-config:
      defaults:
        HTTP_CLIENT_CONNECTION_POOL_SIZE: 1000
        POSTGRES_DEFAULT_COMMAND_CONTROL:
          network_timeout_ms: 500
          statement_timeout_ms: 250

    testsuite-support: {}


    http-client:
    dns-client:
      fs-task-processor: fs-task-processor

    handler-ping:
      path: /ping
      method: GET
      task_processor: main-task-processor

    telegram-bot:
      token: $bot-token
      poll-timeout-seconds: 20
      limit: 100

    postgres-db-1:
      dbconnection: $pg-connection
      dbconnection#env: DB_CONNECTION
      blocking_task_processor: fs-task-processor
      dns_resolver: async
      sync-start: true
      connlimit_mode: manual
