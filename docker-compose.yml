services:
  postgres-db:
    image: postgres:18
    container_name: antivoice-tgbot-userver-postgres
    environment:
      POSTGRES_USER: testsuite
      POSTGRES_DB: telegram_bot_db_1
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "15434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testsuite -d telegram_bot_db_1"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 2s
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./postgresql/schemas/db_1.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro
      - ./postgresql/data/initial_data.sql:/docker-entrypoint-initdb.d/10-initial-data.sql:ro

volumes:
  postgres-data:
